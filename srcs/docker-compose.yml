services:
  mariadb:
    container_name: mariadb
    image: mariadb:inception
    build: ./requirements/mariadb
    env_file: .env
    networks:
      - inception_network
    restart: always

  wordpress:
    container_name: wordpress
    image: wordpress:inception
    build: ./requirements/wordpress
    env_file: .env
    networks:
      - inception_network
    depends_on:
      mariadb:
        condition: service_healthy
    restart: always

  nginx:
    container_name: nginx_container
    image: nginx:inception
    build: ./requirements/nginx
    port:
      - "${WEB_PORT}:${WEB_PORT}"
    networks:
      - inception_network
    env_file: .env
    depends_on:
      - wordpress
    restart: always

volumes:
  wordpress_data:
  mariadb_data:
networks:
  inception_network:
    driver: bridge
